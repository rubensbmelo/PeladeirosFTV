<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Peladeiros.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <title>Ranking Completo - Peladeiros de Futevôlei</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G98PRRLH9V"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-G98PRRLH9V');

    <style>
        .legenda-trofeus {
            text-align: center;
            margin-top: 18px;
            font-size: 0.82em;
            color: #aaa;
            letter-spacing: 0.3px;
        }
        .legenda-trofeus span {
            margin: 0 10px;
        }
        .trofeu-tooltip {
            position: relative;
            cursor: default;
            display: inline-block;
        }
        .trofeu-tooltip .tooltip-text {
            visibility: hidden;
            opacity: 0;
            background-color: #222;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            z-index: 10;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.78em;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .trofeu-tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul class="menu-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="quem-somos.html">Quem somos</a></li>
                <li><a href="atletas.html">Atletas</a></li>
                <li><a href="jogos.html">Placares</a></li>
                <li><a href="ranking.html">Ranking</a></li>
                <li><a href="local.html">Local</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <img src="./img/peladeiros.png" alt="Logo Peladeiros" class="logo-flutuante">

        <h1 class="titulo-principal" id="titulo-ranking">Ranking Mensalistas</h1>
        <p class="intro">Confira a classificação detalhada de todos os nossos atletas.</p>

        <div class="ranking-controls">
            <button onclick="mudarRanking('total')" id="btn-total" class="btn-filtro ativo">Geral (Acumulado)</button>
            <button onclick="mudarRanking('mes')" id="btn-mes" class="btn-filtro">Mensal (Maio)</button>
        </div>

        <section id="ranking-detalhado">
            <div style="overflow-x: auto;">
                <table class="tabela-ranking">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th style="text-align: left; padding-left: 20px;">Atleta</th>
                            <th id="label-pontos">Pontos</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                    </tbody>
                </table>
            </div>

            <div id="legenda-trofeus" class="legenda-trofeus" style="display:none;">
                <span>🥇 Líder do ranking geral</span>
                <span>|</span>
                <span>🏆 Campeão mensal</span>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" class="btn-local">Voltar para a Home</a>
            </div>
        </section>
    </main>

    <footer class="rodape-preto">
        <div class="social-links">
            <a href="https://www.instagram.com/peladeirosdefutevolei" target="_blank">
                <img src="./img/instagram.jpeg" alt="Instagram" class="icon">
            </a>
            <a href="https://youtube.com/@peladeirosdefutevolei" target="_blank">
                <img src="./img/youtube.png" alt="YouTube" class="icon">
            </a>
        </div>
        <p>&copy; 2026 Peladeiros de Futevôlei</p>
    </footer>

    <script src="dados_ranking.js"></script>
    <script>
        function mudarRanking(tipo) {
            const corpo = document.getElementById('tabela-corpo');
            const label = document.getElementById('label-pontos');
            const btnTotal = document.getElementById('btn-total');
            const btnMes = document.getElementById('btn-mes');
            const titulo = document.getElementById('titulo-ranking');
            const legenda = document.getElementById('legenda-trofeus');

            // 1. ORDENAR
            const rankingOrdenado = [...bancoDeDadosRanking].sort((a, b) => {
                if (b[tipo] !== a[tipo]) return b[tipo] - a[tipo];
                return a.nome.localeCompare(b.nome);
            });

            const maiorPontuacao = rankingOrdenado[0][tipo];

            // 2. Atualizar visual dos botões e títulos
            if (tipo === 'total') {
                btnTotal.classList.add('ativo');
                btnMes.classList.remove('ativo');
                label.innerText = 'Total';
                titulo.innerText = 'Ranking Geral (Acumulado)';
                legenda.style.display = 'block';
            } else {
                btnMes.classList.add('ativo');
                btnTotal.classList.remove('ativo');
                label.innerText = 'Vitórias (MAI)';
                titulo.innerText = 'Ranking Mensal (Maio)';
                legenda.style.display = 'none';
            }

            // 3. Gerar linhas
            let posicaoExibida = 1;

            corpo.innerHTML = rankingOrdenado.map((atleta, index) => {
                if (index > 0 && atleta[tipo] < rankingOrdenado[index - 1][tipo]) {
                    posicaoExibida = index + 1;
                }

                const eLider = atleta[tipo] === maiorPontuacao;

                // 🥇 líder geral (só no modo total)
                const medalhaLider = (tipo === 'total' && eLider)
                    ? `<span class="trofeu-tooltip"> 🥇<span class="tooltip-text">Líder do ranking geral</span></span>`
                    : '';

                // 🏆 líder mensal (só no modo mes)
                const trofeuLiderMes = (tipo === 'mes' && eLider)
                    ? ` 🏆`
                    : '';

                // 🏆 campeão mensal (só no modo total)
                const trofeuMensal = (tipo === 'total' && atleta.trofeus > 0 && atleta.mesesCampeao.length > 0)
                    ? `<span class="trofeu-tooltip"> 🏆<span class="tooltip-text">Campeão de ${atleta.mesesCampeao.join(', ')}</span></span>`
                    : '';

                return `
                    <tr class="${eLider ? 'primeiro-lugar' : ''}">
                        <td>${posicaoExibida}º</td>
                        <td style="text-align: left; padding-left: 20px;">
                            ${atleta.nome}${medalhaLider}${trofeuMensal}${trofeuLiderMes}
                        </td>
                        <td><strong>${atleta[tipo]}</strong></td>
                    </tr>
                `;
            }).join('');
        }

        window.onload = () => mudarRanking('total');
    </script>
</body>

</html>
